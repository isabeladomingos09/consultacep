<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Busca: CEP & CNPJ</title>
    
    <!-- Fonte Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Link para o CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <!-- Menu de Abas -->
        <div class="tabs">
            <button class="tab-btn active" onclick="abrirAba(event, 'aba-cep')">📍 CEP</button>
            <button class="tab-btn" onclick="abrirAba(event, 'aba-cnpj')">🏢 CNPJ</button>
        </div>

        <!-- Seção de Busca de CEP -->
        <div id="aba-cep" class="tab-content active">
            <div class="icon-header">📍</div>
            <h1>Buscar Endereço</h1>
            <p class="subtitle">Encontre qualquer local pelo CEP</p>

            <div class="input-group">
                <input type="text" id="cep" placeholder="Digite o CEP (8 números)" maxlength="9">
                <button onclick="buscarCEP()">Buscar CEP</button>
            </div>
            <div id="resultado-cep"></div>
        </div>

        <!-- Seção de Busca de CNPJ -->
        <div id="aba-cnpj" class="tab-content">
            <div class="icon-header">🏢</div>
            <h1>Consultar Empresa</h1>
            <p class="subtitle">Dados oficiais da Receita Federal</p>

            <div class="input-group">
                <input type="text" id="cnpj" placeholder="Digite o CNPJ (14 números)" maxlength="18">
                <button onclick="buscarCNPJ()">Consultar CNPJ</button>
            </div>
            <p class="aviso-api">*Limite: 3 consultas por minuto</p>
            <div id="resultado-cnpj"></div>
        </div>
    </div>

    <!-- Link para o JavaScript (Substituindo o Java pelo script.js) -->
    <script src="script.js"></script>
</body>
</html>
