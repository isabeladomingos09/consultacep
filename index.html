<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Busca: CEP & CNPJ</title>
    
    <!-- Linkando a fonte Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Linkando o CSS externo -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <!-- Menu de Abas -->
        <div class="tabs">
            <button class="tab-btn active" onclick="abrirAba(event, 'aba-cep')">📍 CEP</button>
            <button class="tab-btn" onclick="abrirAba(event, 'aba-cnpj')">🏢 CNPJ</button>
        </div>

        <!-- Seção de Busca de CEP -->
        <div id="aba-cep" class="tab-content active">
            <div class="icon-header">📍</div>
            <h1>Buscar Endereço</h1>
            <p class="subtitle">Encontre qualquer local pelo CEP</p>

            <div class="input-group">
                <input type="text" id="cep" placeholder="Digite o CEP (8 números)" maxlength="9">
                <button onclick="buscarCEP()">Buscar CEP</button>
            </div>
            <div id="resultado-cep"></div>
        </div>

        <!-- Seção de Busca de CNPJ -->
        <div id="aba-cnpj" class="tab-content">
            <div class="icon-header">🏢</div>
            <h1>Consultar Empresa</h1>
            <p class="subtitle">Dados oficiais da Receita Federal</p>

            <div class="input-group">
                <input type="text" id="cnpj" placeholder="Digite o CNPJ (14 números)" maxlength="18">
                <button onclick="buscarCNPJ()">Consultar CNPJ</button>
            </div>
            <p class="aviso-api">*Limite: 3 consultas por minuto</p>
            <div id="resultado-cnpj"></div>
        </div>
    </div>

    <script>
        // Lógica para trocar de abas
        function abrirAba(evt, nomeAba) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(nomeAba).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- FUNÇÃO BUSCAR CEP (Atividade Anterior) ---
        function buscarCEP() {
            let cep = document.getElementById('cep').value.replace(/\D/g, '');
            const resultadoDiv = document.getElementById('resultado-cep');

            if (cep.length !== 8) {
                resultadoDiv.innerHTML = '<div class="msg-erro">⚠️ Digite um CEP com 8 números.</div>';
                return;
            }

            resultadoDiv.innerHTML = '<div class="msg-loading">⏳ Buscando...</div>';

            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(res => res.json())
                .then(data => {
                    if (data.erro) throw new Error();
                    resultadoDiv.innerHTML = `
                        <div class="resultado-box anime-fade">
                            <div class="info-linha"><span class="label">Logradouro</span><span class="dado">${data.logradouro || '-'}</span></div>
                            <div class="info-linha"><span class="label">Bairro</span><span class="dado">${data.bairro || '-'}</span></div>
                            <div class="info-linha"><span class="label">Cidade/UF</span><span class="dado">${data.localidade} - ${data.uf}</span></div>
                        </div>
                    `;
                })
                .catch(() => {
                    resultadoDiv.innerHTML = '<div class="msg-erro">❌ CEP não encontrado.</div>';
                });
        }

        // --- FUNÇÃO BUSCAR CNPJ (Atividade Atual) ---
        function buscarCNPJ() {
            let cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
            const resultadoDiv = document.getElementById('resultado-cnpj');

            if (cnpj.length !== 14) {
                resultadoDiv.innerHTML = '<div class="msg-erro">⚠️ Digite um CNPJ com 14 números.</div>';
                return;
            }

            resultadoDiv.innerHTML = '<div class="msg-loading">⏳ Consultando Receita WS...</div>';

            // Uso de JSONP para evitar erro de CORS no navegador
            const script = document.createElement('script');
            script.src = `https://receitaws.com.br/v1/cnpj/${cnpj}?callback=processarCNPJ`;
            document.body.appendChild(script);
        }

        function processarCNPJ(data) {
            const resultadoDiv = document.getElementById('resultado-cnpj');
            if (data.status === "ERROR") {
                resultadoDiv.innerHTML = `<div class="msg-erro">❌ ${data.message}</div>`;
            } else {
                resultadoDiv.innerHTML = `
                    <div class="resultado-box anime-fade">
                        <div class="info-linha"><span class="label">Razão Social</span><span class="dado">${data.nome}</span></div>
                        <div class="info-linha"><span class="label">Situação</span><span class="dado">${data.situacao}</span></div>
                        <div class="info-linha"><span class="label">Atividade</span><span class="dado">${data.atividade_principal[0].text}</span></div>
                        <div class="info-linha"><span class="label">Município/UF</span><span class="dado">${data.municipio} - ${data.uf}</span></div>
                        <div class="info-linha"><span class="label">Abertura</span><span class="dado">${data.abertura}</span></div>
                    </div>
                `;
            }
            const scripts = document.querySelectorAll('script[src*="receitaws"]');
            scripts.forEach(s => s.remove());
        }
    </script>
</body>
</html>
